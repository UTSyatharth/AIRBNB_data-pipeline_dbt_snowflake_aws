version: 2

models:
  - name: silver_bookings
    description: >
      Cleaned and deduplicated booking records, incrementally upserted
      from the bronze layer using metadata-driven logic so only new or
      changed records are processed on each run.

  - name: silver_listings
    description: >
      Cleaned and deduplicated listing records, incrementally upserted
      from the bronze layer, including standardized pricing and
      property attribute fields.

  - name: silver_hosts
    description: >
      Cleaned and deduplicated host profile records, incrementally
      upserted from the bronze layer.